name: Deploy GitHub Pages

# Trigger workflow saat push ke main
on:
  push:
    branches:
      - main

# Permissions yang dibutuhkan
permissions:
  contents: read       # agar checkout bisa baca repo
  pages: write         # untuk deploy ke Pages
  id-token: write      # untuk OIDC deploy-pages

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ⚠️ Environment wajib untuk deploy-pages@v4
    environment:
      name: github-pages

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Upload artifact (file statis HTML/CSS/JS)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: |
            index.html
            css/
            js/

      # 3️⃣ Deploy ke GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
