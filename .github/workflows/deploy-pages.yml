name: Deploy GitHub Pages

# Trigger saat push ke branch main
on:
  push:
    branches:
      - main

# Permissions yang dibutuhkan
permissions:
  contents: read       # agar checkout bisa baca repo
  pages: write         # agar bisa push ke Pages
  id-token: write      # untuk deploy-pages OIDC

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Upload artifact (file statis)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: |
            index.html
            css/
            js/

      # 3️⃣ Deploy ke GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
